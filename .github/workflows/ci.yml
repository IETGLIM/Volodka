name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      - name: Player animation gate
        run: npm run test:player-animations

      - name: Asset budget report
        run: npm run asset-budget

      - name: ESLint
        run: npm run lint

      - name: Production build (Turbopack)
        run: npm run build
