# Ручной smoke комнаты Володьки через Browserbase (см. docs/volodka-room-smoke.md, browserbase-functions/volodka-smoke).
# Функция по умолчанию делает deepBoot: меню → новая игра → пропуск интро → ожидание WebGL (R3F).
# Секрет BROWSERBASE_API_KEY в настройках репозитория — опционально; без него job завершается успешно с пропуском.

name: Volodka room smoke (Browserbase)

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install smoke package
        run: npm ci --prefix browserbase-functions/volodka-smoke

      - name: Run Browserbase publish (optional)
        env:
          BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
        run: |
          if [ -z "$BROWSERBASE_API_KEY" ]; then
            echo "BROWSERBASE_API_KEY not set — skipping bb publish (добавьте secret для реального smoke)."
            exit 0
          fi
          npm run publish --prefix browserbase-functions/volodka-smoke
